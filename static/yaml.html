<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAML Linter & Validator — DevSuite</title>
    <meta name="description" content="Validate, format and convert YAML locally. Supports Kubernetes, Docker Compose, GitHub Actions. Zero data leaves your machine.">
        <link rel="stylesheet" href="/static/libs/fonts.css">
    <link rel="stylesheet" href="/static/linter.css">
    <!-- js-yaml for YAML parsing -->
    <script src="/static/libs/js-yaml.min.js"></script>
    <script src="/static/theme.js?v=2"></script>
</head>
<body>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- ====================================================
     HEADER
     ==================================================== -->
<header class="tool-header" aria-label="YAML Linter toolbar">
    <div class="header-left">
        <a href="/tools" class="back-link" aria-label="Back to DevSuite tools">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
            DevSuite
        </a>
        <div class="tool-identity">
            <div class="tool-icon" style="background:linear-gradient(135deg,#065f46,#059669);box-shadow:0 0 14px rgba(5,150,105,0.4);" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                    <line x1="8" y1="18" x2="21" y2="18"/>
                    <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
            </div>
            <span class="tool-name">YAML <span class="tool-accent">Linter</span></span>
            <span class="tool-version">Validator v1.0</span>
        </div>
    </div>
    <div class="header-right">
        <span id="char-count" class="line-badge" aria-live="polite" aria-atomic="true">0 chars</span>
    </div>
</header>

<!-- ====================================================
     ACTION TOOLBAR
     ==================================================== -->
<div class="action-toolbar" role="toolbar" aria-label="YAML actions">
    <output id="status-pill" class="status-pill idle" aria-live="polite" aria-atomic="true">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-text">Ready</span>
    </output>
    <div class="toolbar-sep" aria-hidden="true"></div>
    <button id="btn-validate" class="btn btn-primary" title="Validate YAML (Ctrl+Enter)" aria-label="Validate YAML (Ctrl+Enter)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        Validate
    </button>
    <button id="btn-format" class="btn btn-ghost" title="Re-dump as clean YAML" aria-label="Format YAML">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
        Format
    </button>
    <button id="btn-to-json" class="btn btn-ghost" title="Convert YAML → pretty JSON" aria-label="→ JSON — convert YAML to pretty-printed JSON">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 3H7a2 2 0 00-2 2v5a2 2 0 01-2 2 2 2 0 012 2v5c0 1.1.9 2 2 2h1"/>
            <path d="M16 21h1a2 2 0 002-2v-5c0-1.1.9-2 2-2a2 2 0 01-2-2V5a2 2 0 00-2-2h-1"/>
        </svg>
        → JSON
    </button>
    <button id="btn-to-json-min" class="btn btn-ghost" title="Convert YAML → minified JSON" aria-label="→ JSON (min) — convert YAML to minified JSON">
        → JSON (min)
    </button>
    <div class="toolbar-sep" aria-hidden="true"></div>
    <button id="btn-clear" class="btn btn-ghost" title="Clear editor" aria-label="Clear editor">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        Clear
    </button>
    <div class="toolbar-spacer" aria-hidden="true"></div>
    <button id="btn-copy-output" class="btn btn-ghost" disabled title="Copy output" aria-label="Copy output to clipboard">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy Output
    </button>
</div>

<!-- ====================================================
     SPLIT PANE
     ==================================================== -->
<main class="tool-main">
    <div class="split-pane">

        <!-- Input (Editor) -->
        <div class="pane-editor">
            <div class="pane-header">
                <span class="pane-label">Input YAML</span>
                <div class="pane-actions">
                    <span id="line-count" class="line-badge" aria-live="polite" aria-atomic="true">0 lines</span>
                    <button id="btn-paste" class="btn btn-ghost" style="padding:2px 8px;font-size:0.7rem;" aria-label="📋 Paste from clipboard">📋 Paste</button>
                </div>
            </div>
            <div id="input-editor" class="monaco-host" aria-label="YAML input editor"></div>
            <div id="error-panel" class="error-panel" role="alert" aria-live="assertive" aria-atomic="true">
                <span class="error-icon" aria-hidden="true">⚠️</span>
                <div class="error-body">
                    <div id="error-message" class="error-message"></div>
                    <div id="error-hint"   class="error-hint"></div>
                </div>
            </div>
        </div>

        <!-- Output -->
        <div class="pane-output">
            <div class="pane-header">
                <span class="pane-label" id="output-label">Output</span>
                <div class="pane-actions">
                    <span id="output-line-count" class="line-badge" style="display:none;" aria-live="polite" aria-atomic="true"></span>
                </div>
            </div>
            <div id="output-empty" class="output-empty" aria-label="Output area — empty">
                <span class="output-empty-icon" aria-hidden="true">⚙️</span>
                <span>Run Validate, Format or → JSON to see output</span>
            </div>
            <section id="output-editor" class="output-monaco-host" style="display:none;" aria-label="YAML output" aria-live="polite"></section>
        </div>

    </div>
</main>

<script src="/static/libs/require.min.js"></script>
<script src="/static/components.js"></script>
<script>
(function () {
    'use strict';

    const toast = DevSuite.toast;

    function parseYaml(raw) {
        try {
            const docs = [];
            jsyaml.loadAll(raw, doc => docs.push(doc));
            return { ok: true, data: docs.length === 1 ? docs[0] : docs };
        } catch (e) {
            return { ok: false, error: e };
        }
    }

    DevSuite.initMonaco(() => {

        let inputEditor, outputModel;
        let lastOutput = '', lastOutputLang = 'yaml';

        inputEditor = monaco.editor.create(document.getElementById('input-editor'), {
            value: '',
            language: 'yaml',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 14, fontFamily: "'JetBrains Mono', monospace",
            lineHeight: 22, minimap: { enabled: false },
            scrollBeyondLastLine: false, padding: { top: 12, bottom: 12 },
            wordWrap: 'on',
        });

        outputModel = monaco.editor.createModel('', 'yaml');
        monaco.editor.create(document.getElementById('output-editor'), {
            model: outputModel,
            theme: 'vs-dark',
            readOnly: true,
            automaticLayout: true,
            fontSize: 14, fontFamily: "'JetBrains Mono', monospace",
            lineHeight: 22, minimap: { enabled: false },
            scrollBeyondLastLine: false, padding: { top: 12, bottom: 12 },
            wordWrap: 'on',
        });

        const statusPill       = document.getElementById('status-pill');
        const statusText       = document.getElementById('status-text');
        const charCount        = document.getElementById('char-count');
        const lineCount        = document.getElementById('line-count');
        const errorPanel       = document.getElementById('error-panel');
        const errorMsg         = document.getElementById('error-message');
        const errorHint        = document.getElementById('error-hint');
        const outputEmpty      = document.getElementById('output-empty');
        const outputEditorEl   = document.getElementById('output-editor');
        const outputLineCount  = document.getElementById('output-line-count');
        const outputLabel      = document.getElementById('output-label');
        const copyBtn          = document.getElementById('btn-copy-output');

        function setStatus(s, text) {
            statusPill.className = `status-pill ${s}`;
            statusText.textContent = text;
        }

        function updateCounts() {
            const v = inputEditor.getValue();
            charCount.textContent = v.length.toLocaleString() + ' chars';
            const lines = v ? v.split('\n').length : 0;
            lineCount.textContent = lines + ' line' + (lines === 1 ? '' : 's');
        }

        function showError(msg, hint = '') {
            errorMsg.textContent = msg;
            errorHint.textContent = hint;
            errorPanel.classList.add('visible');
            setStatus('invalid', 'Invalid YAML');
        }

        function clearError() { errorPanel.classList.remove('visible'); }

        function showOutput(text, label, lang = 'yaml') {
            // Switch output model language
            if (lang !== lastOutputLang) {
                monaco.editor.setModelLanguage(outputModel, lang);
                lastOutputLang = lang;
            }
            outputModel.setValue(text);
            const lines = text.split('\n').length;
            outputEmpty.style.display = 'none';
            outputEditorEl.style.display = '';
            outputLineCount.style.display = '';
            outputLineCount.textContent = lines + ' lines';
            outputLabel.textContent = label;
            lastOutput = text;
            copyBtn.disabled = false;
        }


        /* Live validation */
        let liveTimer;
        inputEditor.onDidChangeModelContent(() => {
            updateCounts();
            clearTimeout(liveTimer);
            liveTimer = setTimeout(() => {
                const raw = inputEditor.getValue().trim();
                if (!raw) { setStatus('idle', 'Ready'); clearError(); return; }
                const r = parseYaml(raw);
                if (r.ok) { setStatus('valid', 'Valid YAML'); clearError(); }
                else { showError(r.error.message, 'Check indentation and special characters'); }
            }, 600);
        });

        /* VALIDATE */
        document.getElementById('btn-validate').addEventListener('click', () => {
            const raw = inputEditor.getValue().trim();
            if (!raw) { toast('Editor is empty', 'warning'); return; }
            const r = parseYaml(raw);
            if (r.ok) {
                const preview = jsyaml.dump(r.data, { indent: 2, lineWidth: 120 });
                showOutput(preview, 'Validated — Preview', 'yaml');
                setStatus('valid', 'Valid YAML ✓');
                clearError();
                toast('YAML is valid!', 'success', 2500);
            } else {
                showError(r.error.message, 'Fix the error and re-run');
                toast('Invalid YAML — see error below', 'error');
            }
        });

        /* FORMAT */
        document.getElementById('btn-format').addEventListener('click', () => {
            const raw = inputEditor.getValue().trim();
            if (!raw) { toast('Nothing to format', 'warning'); return; }
            const r = parseYaml(raw);
            if (!r.ok) { showError(r.error.message, 'Fix errors before formatting'); toast('Cannot format invalid YAML', 'error'); return; }
            const formatted = jsyaml.dump(r.data, { indent: 2, lineWidth: 120, quotingType: '"' });
            showOutput(formatted, 'Formatted YAML', 'yaml');
            setStatus('valid', 'Valid YAML');
            clearError();
            toast('YAML formatted!', 'success', 2000);
        });

        /* → JSON */
        document.getElementById('btn-to-json').addEventListener('click', () => {
            const raw = inputEditor.getValue().trim();
            if (!raw) { toast('Nothing to convert', 'warning'); return; }
            const r = parseYaml(raw);
            if (!r.ok) { showError(r.error.message, 'Fix errors before converting'); toast('Cannot convert invalid YAML', 'error'); return; }
            const json = JSON.stringify(r.data, null, 2);
            showOutput(json, 'Converted → JSON', 'json');
            setStatus('valid', 'Valid YAML');
            clearError();
            toast('Converted to JSON!', 'success', 2000);
        });

        /* → JSON (minified) */
        document.getElementById('btn-to-json-min').addEventListener('click', () => {
            const raw = inputEditor.getValue().trim();
            if (!raw) { toast('Nothing to convert', 'warning'); return; }
            const r = parseYaml(raw);
            if (!r.ok) { showError(r.error.message, 'Fix errors first'); toast('Cannot convert invalid YAML', 'error'); return; }
            const json = JSON.stringify(r.data);
            showOutput(json, 'Converted → JSON (minified)', 'json');
            setStatus('valid', 'Valid YAML');
            clearError();
            toast('Converted to minified JSON!', 'success', 2000);
        });

        /* CLEAR */
        document.getElementById('btn-clear').addEventListener('click', () => {
            inputEditor.setValue('');
            outputModel.setValue('');
            outputEmpty.style.display = '';
            outputEditorEl.style.display = 'none';
            outputLineCount.style.display = 'none';
            outputLabel.textContent = 'Output';
            copyBtn.disabled = true;
            lastOutput = '';
            clearError();
            setStatus('idle', 'Ready');
        });

        /* PASTE */
        document.getElementById('btn-paste').addEventListener('click', async () => {
            try {
                const txt = await navigator.clipboard.readText();
                inputEditor.setValue(txt);
                toast('Pasted from clipboard', 'success', 2000);
            } catch { toast('Clipboard access denied — paste manually (Ctrl+V)', 'warning'); }
        });

        /* COPY OUTPUT */
        copyBtn.addEventListener('click', async () => {
            if (!lastOutput) return;
            try {
                await navigator.clipboard.writeText(lastOutput);
                toast('Copied to clipboard!', 'success', 2000);
            } catch { toast('Failed to copy', 'error'); }
        });

        /* Keyboard shortcut */
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('btn-validate').click();
            }
        });

        updateCounts();
    });
})();
</script>
</body>
</html>
