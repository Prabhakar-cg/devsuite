<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link & QR Studio — DevSuite</title>
    <meta name="description" content="Public link shortener and barcode generator.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/linter.css">
    <script src="/static/theme.js?v=2"></script>
    <script src="/static/bwip-js-min.js"></script>
    <style>
        /* Tool-specific Layout Variables mapped to generic tokens */
        :root {
            --url-accent: #0284c7;
            --url-accent-light: #38bdf8;
            --url-bg: rgba(10,14,30,0.3);
            --url-field-bg: rgba(255,255,255,0.05);
            --url-border: rgba(255,255,255,0.07);
            --url-text: #e2e8f0;
            --url-placeholder: rgba(148,163,184,0.55);
            --url-shadow: rgba(0,0,0,0.25);
        }

        /* ── Clean Light ── */
        html[data-theme="vs"] {
            --url-bg: #f8fafc;
            --url-field-bg: #ffffff;
            --url-border: rgba(0,0,0,0.08);
            --url-text: #0f172a;
            --url-placeholder: #94a3b8;
            --url-shadow: rgba(0,0,0,0.05);
        }

        /* ── Frosted Glass ── */
        html[data-theme="ios-glass"] {
            --url-bg: rgba(255,255,255,0.4);
            --url-field-bg: rgba(255,255,255,0.65);
            --url-border: rgba(99,130,255,0.15);
            --url-text: #1c1c1e;
            --url-placeholder: rgba(60,60,100,0.45);
            --url-shadow: rgba(80,100,220,0.08);
        }

        /* ── High Contrast ── */
        html[data-theme="high-contrast"] {
            --url-bg: transparent;
            --url-field-bg: transparent;
            --url-border: rgba(255,255,255,0.3);
            --url-text: #ffffff;
            --url-placeholder: #888888;
        }

        /* Container Layout */
        .url-layout {
            flex: 1; display: flex; flex-direction: column; overflow-y: auto;
            align-items: center; padding: 4rem 1.5rem; gap: 2.5rem;
        }

        .url-card {
            background: var(--url-bg);
            border: 1px solid var(--url-border);
            border-radius: 12px;
            width: 100%; max-width: 650px;
            padding: 2rem;
            box-shadow: 0 8px 32px var(--url-shadow);
            display: flex; flex-direction: column; gap: 1.5rem;
        }

        .url-header {
            font-size: 1.4rem; font-weight: 700; color: var(--url-text);
            text-align: center; margin-bottom: 0.5rem;
            display: flex; align-items: center; justify-content: center; gap: 0.75rem;
        }

        .input-group {
            display: flex; gap: 0.5rem;
            flex-direction: column;
        }

        .url-input {
            width: 100%; padding: 1rem 1.25rem;
            border-radius: 8px; border: 1px solid var(--url-border);
            background: var(--url-field-bg); color: var(--url-text);
            font-size: 1.05rem; font-family: var(--font-mono);
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .url-input:focus { border-color: var(--url-accent-light); box-shadow: 0 0 0 2px rgba(56,189,248,0.2); }
        .url-input::placeholder { color: var(--url-placeholder); }

        .btn-shorten {
            padding: 1rem 2rem; border-radius: 8px; font-weight: 600; font-size: 1.05rem;
            background: linear-gradient(135deg, var(--url-accent), var(--url-accent-light));
            color: #ffffff; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 4px 14px rgba(56,189,248,0.3);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-shorten:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(56,189,248,0.4); }
        .btn-shorten:active { transform: translateY(1px); }

        /* Result Section */
        #result-box {
            display: none;
            background: rgba(16,185,129,0.1);
            border: 1px dashed rgba(16,185,129,0.3);
            border-radius: 8px; padding: 1.5rem;
            text-align: center; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }
        
        .result-label { font-size: 0.85rem; font-weight: 600; color: #10b981; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .short-url-val {
            font-size: 1.35rem; font-family: var(--font-mono); font-weight: 700;
            color: var(--url-text); word-break: break-all; margin-bottom: 1rem;
        }

        .btn-copy {
            padding: 0.6rem 1.25rem; font-size: 0.9rem; font-weight: 500;
            background: var(--url-field-bg); color: var(--url-text);
            border: 1px solid var(--url-border); border-radius: 6px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 0.4rem; transition: background 0.15s;
        }
        .btn-copy:hover { background: rgba(56,189,248,0.15); border-color: rgba(56,189,248,0.3); color: var(--url-accent-light); }

        .barcode-section { margin-top: 1.5rem; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
        .barcode-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--url-border);
            border-radius: 8px; padding: 1rem; display: flex; flex-direction: column;
            align-items: center; gap: 0.75rem; flex: 1; min-width: 200px;
        }
        .barcode-title { font-size: 0.8rem; font-weight: 600; color: var(--url-placeholder); text-transform: uppercase; letter-spacing: 0.05em; }
        .canvas-bg { background: #ffffff; padding: 0.75rem; border-radius: 6px; display: flex; align-items: center; justify-content: center; width: 100%; box-sizing: border-box; }
        .canvas-bg canvas { max-width: 100%; height: auto; object-fit: contain; }
        .btn-dl { 
            padding: 0.5rem 1rem; font-size: 0.8rem; border-radius: 4px; border: 1px solid var(--url-border); 
            background: transparent; color: var(--url-text); cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; gap: 0.4rem;
        }
        .btn-dl:hover { background: var(--url-field-bg); color: var(--url-accent-light); border-color: var(--url-accent-light); }

        /* Recent Links */
        .recent-links { width: 100%; max-width: 650px; display: none; }
        .recent-header { font-size: 0.85rem; font-weight: 600; color: var(--url-placeholder); text-transform: uppercase; margin-bottom: 1rem; letter-spacing: 0.05em; }
        .link-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .link-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--url-bg); border: 1px solid var(--url-border);
            border-radius: 8px; padding: 0.85rem 1.25rem; transition: border-color 0.2s;
        }
        .link-item:hover { border-color: var(--url-accent-light); }
        .link-orig { flex: 1; font-size: 0.85rem; color: var(--url-placeholder); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 1rem; }
        .link-short { font-size: 0.9rem; font-family: var(--font-mono); font-weight: 600; color: var(--url-accent-light); flex-shrink: 0; display:flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .link-short:hover { text-decoration: underline; }
        .link-copy-icon { opacity: 0.6; cursor: pointer; transition: opacity 0.15s; }
        .link-copy-icon:hover { opacity: 1; }

    </style>
</head>
<body>

<div id="toast-container"></div>

<!-- HEADER -->
<header class="tool-header">
    <div class="header-left">
        <a href="/" class="back-link">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            DevSuite
        </a>
        <div class="tool-identity">
            <div class="tool-icon" style="background:linear-gradient(135deg,#0284c7,#38bdf8);box-shadow:0 0 16px rgba(56,189,248,0.4);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
            </div>
            <span class="tool-name">Link & QR <span class="tool-accent" style="color:#38bdf8;">Studio</span></span>
            <span class="tool-version">v1.0</span>
        </div>
    </div>
    <div class="header-right">
    </div>
</header>

<main class="url-layout">
    <div class="url-card">
        <h1 class="url-header">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            Generate Local Link & Codes
        </h1>
        <div class="input-group">
            <input type="url" id="url-input" class="url-input" placeholder="https://github.com/microsoft/monaco-editor..." autocomplete="off">
            <button id="btn-shorten" class="btn-shorten">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                Create Short Link
            </button>
        </div>

        <div id="result-box">
            <div class="result-label">Success! Your local short link:</div>
            <div id="short-url-val" class="short-url-val"></div>
            <button id="btn-copy-main" class="btn-copy" style="margin-bottom: 1rem;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy Link
            </button>
            <div class="barcode-section">
                <div class="barcode-card">
                    <div class="barcode-title">QR Code</div>
                    <div class="canvas-bg"><canvas id="qr-canvas"></canvas></div>
                    <button class="btn-dl" onclick="downloadCanvas('qr-canvas', 'qr_code.png')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download PNG
                    </button>
                </div>
                <div class="barcode-card">
                    <div class="barcode-title">Barcode (Code128)</div>
                    <div class="canvas-bg"><canvas id="barcode-canvas"></canvas></div>
                    <button class="btn-dl" onclick="downloadCanvas('barcode-canvas', 'barcode.png')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download PNG
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="recent-links" id="recent-links-section">
        <div class="recent-header">Recent Links (Session)</div>
        <div class="link-list" id="link-list">
            <!-- Dynamically populated -->
        </div>
    </div>
</main>

<script>
    function toast(msg, type = 'info', ms = 3000) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        
        const span = document.createElement('span');
        span.textContent = msg;
        
        const btn = document.createElement('button');
        btn.className = 'toast-close';
        btn.textContent = '✕';
        btn.onclick = function() {
            this.parentElement.classList.add('hide');
            setTimeout(() => this.parentElement.remove(), 300);
        };
        
        t.appendChild(span);
        t.appendChild(btn);
        c.appendChild(t);
        setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 300); }, ms);
    }

    const RECENTS_KEY = 'devsuite_url_recents';
    let recents = [];

    function loadRecents() {
        try {
            const raw = localStorage.getItem(RECENTS_KEY);
            if (raw) recents = JSON.parse(raw);
        } catch(e) {}
        renderRecents();
    }

    function saveRecent(orig, shortUrl) {
        // Prevent strictly identical ones
        recents = recents.filter(r => r.shortUrl !== shortUrl);
        recents.unshift({ orig, shortUrl });
        if (recents.length > 5) recents.pop();
        localStorage.setItem(RECENTS_KEY, JSON.stringify(recents));
        renderRecents();
    }

    function renderRecents() {
        const sec = document.getElementById('recent-links-section');
        const list = document.getElementById('link-list');
        if (recents.length === 0) {
            sec.style.display = 'none';
            return;
        }
        sec.style.display = 'block';
        list.innerHTML = '';
        recents.forEach(r => {
            const item = document.createElement('div');
            item.className = 'link-item';
            
            const orig = document.createElement('div');
            orig.className = 'link-orig';
            orig.textContent = r.orig;

            const shortWrap = document.createElement('div');
            shortWrap.className = 'link-short';
            
            const anchor = document.createElement('a');
            anchor.href = r.shortUrl;
            anchor.target = '_blank';
            anchor.style.color = 'inherit';
            anchor.textContent = r.shortUrl.split('//')[1] || r.shortUrl;

            const copySvg = document.createElement('div');
            copySvg.className = 'link-copy-icon';
            copySvg.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
            copySvg.onclick = async () => {
                try {
                    await navigator.clipboard.writeText(r.shortUrl);
                    toast('Copied short URL', 'success', 2000);
                } catch(e) { }
            };

            shortWrap.appendChild(anchor);
            shortWrap.appendChild(copySvg);

            item.appendChild(orig);
            item.appendChild(shortWrap);
            list.appendChild(item);
        });
    }

    document.getElementById('btn-shorten').addEventListener('click', async () => {
        const input = document.getElementById('url-input');
        const url = input.value.trim();
        if (!url) {
            toast('Please enter a URL first', 'warning');
            return;
        }

        try {
            const res = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            const data = await res.json();

            if (res.ok) {
                document.getElementById('short-url-val').textContent = data.short_url;
                document.getElementById('result-box').style.display = 'block';
                input.value = '';
                toast('Link & codes generated!', 'success');
                saveRecent(data.original_url, data.short_url);

                // Render Barcodes via bwip-js
                try {
                    bwipjs.toCanvas('qr-canvas', {
                        bcid: 'qrcode',
                        text: data.original_url,
                        scale: 4,
                        includetext: false
                    });
                    
                    // Truncate for Code128 if needed — encode the full original URL
                    const barcodeText = data.original_url.length > 80
                        ? data.original_url.substring(0, 80)
                        : data.original_url;
                    bwipjs.toCanvas('barcode-canvas', {
                        bcid: 'code128',
                        text: barcodeText,
                        scale: 2,
                        height: 12,
                        includetext: true,
                        textxalign: 'center'
                    });
                } catch (err) {
                    console.error('Barcode render failed:', err);
                    toast('Failed to render barcodes.', 'warning');
                }
            } else {
                toast(data.detail || 'Failed to shorten URL', 'error');
            }
        } catch (e) {
            toast('Network error saving URL', 'error');
        }
    });

    document.getElementById('btn-copy-main').addEventListener('click', async () => {
        const txt = document.getElementById('short-url-val').textContent;
        if (!txt) return;
        try {
            await navigator.clipboard.writeText(txt);
            toast('Copied to clipboard!', 'success');
        } catch(e) {
            toast('Copy failed', 'error');
        }
    });

    document.getElementById('url-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();
            document.getElementById('btn-shorten').click();
        }
    });

    function downloadCanvas(canvasId, filename) {
        const canvas = document.getElementById(canvasId);
        // Create an empty canvas to draw white background (since bwipjs is transparent)
        const newCanvas = document.createElement("canvas");
        newCanvas.width = canvas.width + 20;
        newCanvas.height = canvas.height + 20;
        const ctx = newCanvas.getContext("2d");
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, newCanvas.width, newCanvas.height);
        ctx.drawImage(canvas, 10, 10);
        
        const link = document.createElement('a');
        link.download = filename;
        link.href = newCanvas.toDataURL("image/png");
        link.click();
    }

    // Init
    loadRecents();
</script>
</body>
</html>
