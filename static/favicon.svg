<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f111a"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6.5" fill="url(#bg)"/>
  <!-- Subtle blue border -->
  <rect width="32" height="32" rx="6.5" fill="none" stroke="#1e3a5f" stroke-width="0.8"/>

  <!-- Glow layer (blurred copy of icon) -->
  <g filter="url(#blur)" opacity="0.45">
    <polyline points="8,10 3.5,16 8,22"   fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="20" y1="9" x2="12" y2="23" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
    <polyline points="24,10 28.5,16 24,22" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- < bracket -->
  <polyline points="8,10 3.5,16 8,22"   fill="none" stroke="url(#glow)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / slash -->
  <line x1="20" y1="9" x2="12" y2="23" stroke="url(#glow)" stroke-width="2.4" stroke-linecap="round"/>
  <!-- > bracket -->
  <polyline points="24,10 28.5,16 24,22" fill="none" stroke="url(#glow)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
