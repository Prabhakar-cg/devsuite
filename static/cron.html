<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron Visualizer — DevSuite</title>
    <meta name="description" content="Build, validate, and visualize cron expressions interactively. Supports Unix, Quartz, AWS EventBridge, and GitHub Actions dialects. Preview next run times and export ready-made snippets.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/cron.css?v=1">
    <script src="/static/theme.js?v=2"></script>
</head>
<body>

    <!-- ================================================
         HEADER
         ================================================ -->
    <header class="app-header">
        <a href="/" class="back-link" id="back-home-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            DevSuite
        </a>

        <div class="header-center">
            <div class="tool-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </div>
            <span class="tool-title">Cron <span>Visualizer</span></span>
        </div>

        <div class="header-right">
            <select class="global-theme-select" aria-label="DevSuite Theme" id="theme-select-cron">
                <option value="vs-dark">Midnight Dark</option>
                <option value="vs">Clean Light</option>
                <option value="hc-black">High Contrast</option>
                <option value="ios-glass">Frosted Glass</option>
            </select>
        </div>
    </header>

    <!-- ================================================
         MAIN CONTENT
         ================================================ -->
    <main class="cron-main" id="cron-main">

        <!-- ── § 1. Dialect Selector ── -->
        <section class="cron-card section-dialect" id="section-dialect">
            <div class="section-heading">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
                </svg>
                Cron Dialect
            </div>
            <div class="dialect-tabs" role="group" aria-label="Cron dialect selector">
                <button class="dialect-btn active" data-dialect="unix" id="dialect-unix" aria-pressed="true">
                    Unix / Linux
                    <span class="dialect-badge">5-field</span>
                </button>
                <button class="dialect-btn" data-dialect="quartz" id="dialect-quartz" aria-pressed="false">
                    Quartz / Spring
                    <span class="dialect-badge">6–7 field</span>
                </button>
                <button class="dialect-btn" data-dialect="aws" id="dialect-aws" aria-pressed="false">
                    AWS EventBridge
                    <span class="dialect-badge">6-field</span>
                </button>
                <button class="dialect-btn" data-dialect="github" id="dialect-github" aria-pressed="false">
                    GitHub Actions
                    <span class="dialect-badge">POSIX</span>
                </button>
            </div>
        </section>

        <!-- ── § 2. Expression Input ── -->
        <section class="cron-card section-input" id="section-input">
            <div class="section-heading">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
                </svg>
                Cron Expression
            </div>

            <div class="expr-row">
                <div class="expr-input-wrap">
                    <input
                        type="text"
                        id="cron-input"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        placeholder="min hour dom month dow"
                        value="*/15 9-17 * * 1-5"
                        aria-label="Cron expression input"
                    >
                </div>
                <span class="status-pill status-empty" id="cron-status" aria-live="polite">– Empty</span>
            </div>

            <!-- Field chips row -->
            <div class="field-chips-row" id="cron-fields-display" aria-label="Parsed cron fields"></div>

            <!-- GitHub Actions YAML context (shown only for github dialect) -->
            <div class="github-context" id="github-context">
                <span class="yaml-key">on</span>:<br>
                &nbsp;&nbsp;<span class="yaml-key">schedule</span>:<br>
                &nbsp;&nbsp;&nbsp;&nbsp;- <span class="yaml-key">cron</span>: <span class="yaml-val" id="github-yaml-val">'*/15 9-17 * * 1-5'</span>
            </div>
        </section>

        <!-- ── § 3. Human-Readable Description ── -->
        <section class="cron-card section-desc" id="section-desc">
            <div class="section-heading">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                Human-Readable Description
            </div>
            <div class="desc-output" id="cron-description" aria-live="polite">—</div>
        </section>

        <!-- ── § 4. Next Run Times ── -->
        <section class="cron-card section-next" id="section-next">
            <div class="next-runs-header">
                <div class="section-heading" style="margin-bottom:0">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    Next 10 Runs
                </div>
                <button class="icon-btn" id="copy-runs-btn" aria-label="Copy all next run times">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                    Copy All
                </button>
            </div>
            <ul id="next-runs-list" aria-label="Upcoming scheduled run times" style="margin-top:1rem;"></ul>
        </section>

        <!-- ── § 5. Visual Field Builder ── -->
        <section class="cron-card section-builder" id="section-builder">
            <div class="section-heading">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                </svg>
                Visual Field Builder
                <span style="font-size:0.7rem;font-weight:400;color:var(--cron-muted);margin-left:0.5rem;">(click to toggle values)</span>
            </div>
            <div id="field-builder"></div>
        </section>

        <!-- ── § 6. Activity Heatmap ── -->
        <section class="cron-card section-heatmap" id="section-heatmap">
            <div class="section-heading">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
                </svg>
                28-Day Activity Heatmap
                <span style="font-size:0.7rem;font-weight:400;color:var(--cron-muted);margin-left:0.5rem;">(next 28 days, up to 500 runs)</span>
            </div>
            <div id="cron-heatmap"></div>
        </section>

        <!-- ── § 7. Preset Library ── -->
        <section class="cron-card section-presets" id="section-presets">
            <div class="section-heading">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                Quick Presets
            </div>
            <div class="presets-grid" id="preset-list"></div>
        </section>

        <!-- ── § 8. Export ── -->
        <section class="cron-card section-export" id="section-export">
            <div class="section-heading">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                Export
            </div>
            <div class="export-row">
                <button class="export-btn export-btn-primary" id="copy-expr-btn" aria-label="Copy cron expression to clipboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                    Copy Expression
                </button>
                <button class="export-btn" id="copy-yaml-btn" aria-label="Copy as YAML snippet">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                    </svg>
                    Copy as YAML
                    <span style="font-size:0.65rem;opacity:0.6;">(K8s / GH Actions)</span>
                </button>
                <button class="export-btn" id="copy-json-btn" aria-label="Copy as JSON for AWS EventBridge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5c0 1.1.9 2 2 2h1"/><path d="M16 21h1a2 2 0 0 0 2-2v-5c0-1.1.9-2 2-2a2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1"/>
                    </svg>
                    Copy as JSON
                    <span style="font-size:0.65rem;opacity:0.6;">(AWS EventBridge)</span>
                </button>
            </div>
        </section>

    </main>

    <script src="/static/cron.js?v=1"></script>

    <script>
    // Theme selector bridge — mirrors the pattern from other DevSuite tools
    (function () {
        const sel = document.getElementById('theme-select-cron');
        if (!sel) return;

        function applyTheme(t) {
            document.documentElement.dataset.theme = t;
            document.body.dataset.theme = t;
        }

        // Sync with saved preference
        const saved = localStorage.getItem('devsuite-theme') || 'vs-dark';
        sel.value = saved;
        applyTheme(saved);

        sel.addEventListener('change', () => {
            const t = sel.value;
            localStorage.setItem('devsuite-theme', t);
            applyTheme(t);
            document.dispatchEvent(new CustomEvent('devsuite-theme-changed', { detail: { theme: t } }));
        });

        // Also listen for external theme changes
        document.addEventListener('devsuite-theme-changed', (e) => {
            if (e.detail && e.detail.theme && sel.value !== e.detail.theme) {
                sel.value = e.detail.theme;
                applyTheme(e.detail.theme);
            }
        });

        // GitHub dialect: show YAML context block
        document.addEventListener('DOMContentLoaded', () => {
            const githubCtx = document.getElementById('github-context');
            const githubVal = document.getElementById('github-yaml-val');
            const input = document.getElementById('cron-input');

            function updateGithubContext() {
                const isGithub = document.querySelector('.dialect-btn.active')?.dataset.dialect === 'github';
                if (githubCtx) {
                    githubCtx.classList.toggle('github-visible', isGithub);
                }
                if (githubVal && input) {
                    githubVal.textContent = "'" + input.value.trim() + "'";
                }
            }

            document.querySelectorAll('.dialect-btn').forEach(btn => {
                btn.addEventListener('click', () => setTimeout(updateGithubContext, 50));
            });

            if (input) {
                input.addEventListener('input', () => setTimeout(updateGithubContext, 250));
            }

            updateGithubContext();
        });
    }());
    </script>

</body>
</html>
