<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Formatter — DevSuite</title>
    <meta name="description" content="Format JavaScript, TypeScript, CSS, HTML, Markdown, GraphQL locally with Prettier. Zero data leaves your machine.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/linter.css">
    <script src="/static/theme.js?v=2"></script>
</head>
<body>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- ====================================================
     HEADER
     ==================================================== -->
<header class="tool-header">
    <div class="header-left">
        <a href="/" class="back-link">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            DevSuite
        </a>
        <div class="tool-identity">
            <div class="tool-icon tool-icon-sky">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6"/>
                    <polyline points="8 6 2 12 8 18"/>
                </svg>
            </div>
            <span class="tool-name">Code <span class="tool-accent">Formatter</span></span>
            <span class="tool-version">Prettier v3</span>
        </div>
    </div>
    <div class="header-right">
        <span id="char-count" class="line-badge">0 chars</span>
    </div>
</header>

<!-- ====================================================
     ACTION TOOLBAR
     ==================================================== -->
<div class="action-toolbar">
    <div id="status-pill" class="status-pill idle">
        <span class="status-dot"></span>
        <span id="status-text">Ready</span>
    </div>
    <div class="toolbar-sep"></div>

    <!-- Language selector -->
    <select id="lang-select" class="global-theme-select" aria-label="Select Language" style="margin:0;min-width:140px;">
        <option value="javascript">JavaScript / JSX</option>
        <option value="typescript">TypeScript / TSX</option>
        <option value="css">CSS</option>
        <option value="scss">SCSS</option>
        <option value="html">HTML</option>
        <option value="markdown">Markdown</option>
        <option value="graphql">GraphQL</option>
    </select>

    <div class="toolbar-sep"></div>

    <button id="btn-format" class="btn btn-primary" title="Format code (Ctrl+Enter)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Format
    </button>

    <!-- Options -->
    <div class="toolbar-sep"></div>
    <label style="display:flex;align-items:center;gap:6px;font-size:0.76rem;color:var(--text-secondary);cursor:pointer;">
        <span>Tab width</span>
        <select id="opt-tab-width" class="global-theme-select" style="margin:0;min-width:54px;padding:2px 22px 2px 6px;">
            <option value="2" selected>2</option>
            <option value="4">4</option>
        </select>
    </label>
    <label style="display:flex;align-items:center;gap:6px;font-size:0.76rem;color:var(--text-secondary);cursor:pointer;">
        <input type="checkbox" id="opt-semi" checked style="accent-color:var(--accent-1);"> Semicolons
    </label>
    <label style="display:flex;align-items:center;gap:6px;font-size:0.76rem;color:var(--text-secondary);cursor:pointer;">
        <input type="checkbox" id="opt-single-quote" style="accent-color:var(--accent-1);"> Single quotes
    </label>

    <div class="toolbar-sep"></div>
    <button id="btn-clear" class="btn btn-ghost" title="Clear editor">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear
    </button>

    <div class="toolbar-spacer"></div>
    <button id="btn-copy-output" class="btn btn-ghost" disabled title="Copy formatted output">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy Output
    </button>
</div>

<!-- ====================================================
     SPLIT PANE
     ==================================================== -->
<main class="tool-main">
    <div class="split-pane">

        <!-- Input -->
        <div class="pane-editor">
            <div class="pane-header">
                <span class="pane-label" id="input-label">Input Code</span>
                <div class="pane-actions">
                    <span id="line-count" class="line-badge">0 lines</span>
                    <button id="btn-paste" class="btn btn-ghost" style="padding:2px 8px;font-size:0.7rem;">📋 Paste</button>
                </div>
            </div>
            <div id="input-editor" class="monaco-host"></div>
            <div id="error-panel" class="error-panel">
                <span class="error-icon">⚠️</span>
                <div class="error-body">
                    <div id="error-message" class="error-message"></div>
                    <div id="error-hint"   class="error-hint"></div>
                </div>
            </div>
        </div>

        <!-- Output -->
        <div class="pane-output">
            <div class="pane-header">
                <span class="pane-label" id="output-label">Formatted Output</span>
                <div class="pane-actions">
                    <span id="output-line-count" class="line-badge" style="display:none;"></span>
                </div>
            </div>
            <div id="output-empty" class="output-empty">
                <span class="output-empty-icon">{ }</span>
                <span>Press Format or Ctrl+Enter to see formatted output</span>
            </div>
            <div id="output-editor" class="output-monaco-host" style="display:none;"></div>
        </div>

    </div>
</main>

<!-- Prettier v3 (browser standalone) -->
<script src="https://unpkg.com/prettier@3.4.2/standalone.js"></script>
<script src="https://unpkg.com/prettier@3.4.2/plugins/babel.js"></script>
<script src="https://unpkg.com/prettier@3.4.2/plugins/estree.js"></script>
<script src="https://unpkg.com/prettier@3.4.2/plugins/typescript.js"></script>
<script src="https://unpkg.com/prettier@3.4.2/plugins/html.js"></script>
<script src="https://unpkg.com/prettier@3.4.2/plugins/postcss.js"></script>
<script src="https://unpkg.com/prettier@3.4.2/plugins/markdown.js"></script>
<script src="https://unpkg.com/prettier@3.4.2/plugins/graphql.js"></script>

<!-- Monaco -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
<script src="/static/components.js"></script>
<script>
(function () {
    'use strict';

    const toast = DevSuite.toast;

    /* ── Language → Prettier parser + Monaco language map ── */
    const LANG_MAP = {
        javascript: { parser: 'babel',      monacoLang: 'javascript', plugins: () => [prettierPlugins.estree, prettierPlugins.babel] },
        typescript: { parser: 'typescript', monacoLang: 'typescript', plugins: () => [prettierPlugins.estree, prettierPlugins.typescript] },
        css:        { parser: 'css',        monacoLang: 'css',        plugins: () => [prettierPlugins.postcss] },
        scss:       { parser: 'scss',       monacoLang: 'scss',       plugins: () => [prettierPlugins.postcss] },
        html:       { parser: 'html',       monacoLang: 'html',       plugins: () => [prettierPlugins.html] },
        markdown:   { parser: 'markdown',   monacoLang: 'markdown',   plugins: () => [prettierPlugins.markdown] },
        graphql:    { parser: 'graphql',    monacoLang: 'graphql',    plugins: () => [prettierPlugins.graphql] },
    };

    DevSuite.initMonaco(() => {

        let inputEditor, outputEditor, outputModel;
        let lastOutput = '';
        let currentMonacoLang = 'javascript';

        /* ── Input editor ── */
        inputEditor = monaco.editor.create(document.getElementById('input-editor'), {
            value: '',
            language: 'javascript',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 14, fontFamily: "'JetBrains Mono', monospace",
            lineHeight: 22, minimap: { enabled: false },
            scrollBeyondLastLine: false, padding: { top: 12, bottom: 12 },
            wordWrap: 'on',
        });

        /* ── Output editor (read-only) ── */
        outputModel = monaco.editor.createModel('', 'javascript');
        outputEditor = monaco.editor.create(document.getElementById('output-editor'), {
            model: outputModel,
            theme: 'vs-dark',
            readOnly: true,
            automaticLayout: true,
            fontSize: 14, fontFamily: "'JetBrains Mono', monospace",
            lineHeight: 22, minimap: { enabled: false },
            scrollBeyondLastLine: false, padding: { top: 12, bottom: 12 },
            wordWrap: 'on',
        });

        /* ── DOM refs ── */
        const statusPill      = document.getElementById('status-pill');
        const statusText      = document.getElementById('status-text');
        const charCount       = document.getElementById('char-count');
        const lineCount       = document.getElementById('line-count');
        const inputLabel      = document.getElementById('input-label');
        const errorPanel      = document.getElementById('error-panel');
        const errorMsg        = document.getElementById('error-message');
        const errorHint       = document.getElementById('error-hint');
        const outputEmpty     = document.getElementById('output-empty');
        const outputEditorEl  = document.getElementById('output-editor');
        const outputLineCount = document.getElementById('output-line-count');
        const outputLabel     = document.getElementById('output-label');
        const copyBtn         = document.getElementById('btn-copy-output');
        const langSelect      = document.getElementById('lang-select');
        const optTabWidth     = document.getElementById('opt-tab-width');
        const optSemi         = document.getElementById('opt-semi');
        const optSingleQuote  = document.getElementById('opt-single-quote');

        /* ── Helpers ── */
        function setStatus(s, text) {
            statusPill.className = `status-pill ${s}`;
            statusText.textContent = text;
        }

        function updateCounts() {
            const v = inputEditor.getValue();
            charCount.textContent = v.length.toLocaleString() + ' chars';
            const lines = v ? v.split('\n').length : 0;
            lineCount.textContent = lines + ' line' + (lines !== 1 ? 's' : '');
        }

        function showError(msg, hint = '') {
            errorMsg.textContent = msg;
            errorHint.textContent = hint;
            errorPanel.classList.add('visible');
            setStatus('invalid', 'Format error');
        }

        function clearError() { errorPanel.classList.remove('visible'); }

        function showOutput(text, lang) {
            monaco.editor.setModelLanguage(outputModel, lang);
            outputModel.setValue(text);
            const lines = text.split('\n').length;
            outputEmpty.style.display = 'none';
            outputEditorEl.style.display = '';
            outputLineCount.style.display = '';
            outputLineCount.textContent = lines + ' lines';
            outputLabel.textContent = 'Formatted Output';
            lastOutput = text;
            copyBtn.disabled = false;
        }

        /* ── Language selector: switch Monaco input language ── */
        langSelect.addEventListener('change', () => {
            const key = langSelect.value;
            const cfg = LANG_MAP[key];
            if (!cfg) return;
            if (cfg.monacoLang !== currentMonacoLang) {
                monaco.editor.setModelLanguage(inputEditor.getModel(), cfg.monacoLang);
                currentMonacoLang = cfg.monacoLang;
            }
            const labels = {
                javascript: 'JavaScript / JSX', typescript: 'TypeScript / TSX',
                css: 'CSS', scss: 'SCSS', html: 'HTML', markdown: 'Markdown', graphql: 'GraphQL',
            };
            inputLabel.textContent = 'Input — ' + (labels[key] || key);
            // Reset output
            outputModel.setValue('');
            outputEmpty.style.display = '';
            outputEditorEl.style.display = 'none';
            outputLineCount.style.display = 'none';
            copyBtn.disabled = true;
            lastOutput = '';
            clearError();
            setStatus('idle', 'Ready');
        });

        /* ── Live char/line count ── */
        inputEditor.onDidChangeModelContent(() => {
            updateCounts();
            clearError();
            setStatus('idle', 'Ready');
        });

        /* ── FORMAT ── */
        document.getElementById('btn-format').addEventListener('click', async () => {
            const raw = inputEditor.getValue();
            if (!raw.trim()) { toast('Nothing to format', 'warning'); return; }

            const key = langSelect.value;
            const cfg = LANG_MAP[key];
            if (!cfg) { toast('Unknown language', 'error'); return; }

            setStatus('idle', 'Formatting…');

            try {
                const formatted = await prettier.format(raw, {
                    parser:      cfg.parser,
                    plugins:     cfg.plugins(),
                    tabWidth:    Number(optTabWidth.value),
                    semi:        optSemi.checked,
                    singleQuote: optSingleQuote.checked,
                    printWidth:  80,
                });
                showOutput(formatted, cfg.monacoLang);
                clearError();
                setStatus('valid', 'Formatted ✓');
                toast('Code formatted!', 'success', 2000);
            } catch (e) {
                const msg = e.message || String(e);
                showError(msg, 'Check your syntax and try again');
                setStatus('invalid', 'Format error');
                toast('Format failed — see error below', 'error');
            }
        });

        /* ── CLEAR ── */
        document.getElementById('btn-clear').addEventListener('click', () => {
            inputEditor.setValue('');
            outputModel.setValue('');
            outputEmpty.style.display = '';
            outputEditorEl.style.display = 'none';
            outputLineCount.style.display = 'none';
            copyBtn.disabled = true;
            lastOutput = '';
            clearError();
            setStatus('idle', 'Ready');
        });

        /* ── PASTE ── */
        document.getElementById('btn-paste').addEventListener('click', async () => {
            try {
                const txt = await navigator.clipboard.readText();
                inputEditor.setValue(txt);
                toast('Pasted from clipboard', 'success', 2000);
            } catch { toast('Clipboard access denied — paste manually (Ctrl+V)', 'warning'); }
        });

        /* ── COPY OUTPUT ── */
        copyBtn.addEventListener('click', async () => {
            if (!lastOutput) return;
            try {
                await navigator.clipboard.writeText(lastOutput);
                toast('Copied to clipboard!', 'success', 2000);
            } catch { toast('Failed to copy', 'error'); }
        });

        /* ── Ctrl+Enter → Format ── */
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('btn-format').click();
            }
        });

        updateCounts();
    });
})();
</script>
</body>
</html>
