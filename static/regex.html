<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester — DevSuite</title>
    <meta name="description" content="Test regular expressions with real-time match highlighting, group captures, and flag toggles. 100% local.">
        <link rel="stylesheet" href="/static/libs/fonts.css">
    <link rel="stylesheet" href="/static/linter.css">
    <script src="/static/theme.js?v=2"></script>
    <style>
        /* ── Regex-specific overrides ── */
        .regex-input-row {
            display: flex; align-items: center; flex-shrink: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.55rem 1.25rem; gap: 0.5rem;
        }
        .regex-slash {
            font-family: var(--font-mono); font-size: 1.4rem; color: var(--text-muted);
            line-height: 1; padding: 0 2px; flex-shrink: 0;
        }
        #regex-pattern {
            flex: 1; background: var(--bg-surface); color: var(--text-primary);
            border: 1px solid var(--glass-border); border-radius: var(--radius-xs);
            padding: 0.45rem 0.75rem; font-family: var(--font-mono); font-size: 0.9rem;
            outline: none; transition: var(--transition);
        }
        #regex-pattern:focus { border-color: var(--border-accent); box-shadow: 0 0 0 3px var(--accent-subtle); }
        #regex-pattern.invalid { border-color: rgba(244,63,94,0.5); box-shadow: 0 0 0 3px rgba(244,63,94,0.1); }
        #regex-pattern.valid   { border-color: rgba(16,185,129,0.5); }

        .flags-wrap { display: flex; gap: 0.25rem; flex-shrink: 0; }
        .flag-btn {
            font-family: var(--font-mono); font-size: 0.78rem; font-weight: 700;
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; border: 1px solid var(--glass-border);
            background: var(--bg-neu); color: var(--text-muted);
            cursor: pointer; transition: var(--transition); user-select: none;
        }
        .flag-btn:hover   { color: var(--text-primary); border-color: rgba(255,255,255,0.15); }
        .flag-btn.active  { background: var(--accent-subtle); color: var(--accent-2); border-color: var(--border-accent); box-shadow: 0 0 8px var(--accent-glow); }

        /* ── Match results pane ── */
        .match-pane {
            flex: 1; min-height: 0; overflow-y: auto; padding: 0.75rem;
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .match-empty {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-muted); gap: 0.5rem; font-size: 0.85rem; opacity: 0.6;
        }
        .match-empty-icon { font-size: 2rem; opacity: 0.3; }

        .match-summary {
            font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-muted);
            padding-bottom: 0.4rem; border-bottom: 1px solid var(--glass-border);
        }
        .match-summary .count-badge {
            background: var(--accent-subtle); color: var(--accent-2);
            border: 1px solid var(--border-accent); border-radius: 20px;
            padding: 1px 8px; font-size: 0.7rem; margin-left: 0.3rem;
        }

        .match-item {
            background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.2);
            border-radius: var(--radius-xs); padding: 0.55rem 0.75rem;
            display: flex; flex-direction: column; gap: 0.3rem;
        }
        .match-item-head {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.7rem; color: var(--text-muted);
        }
        .match-index { font-weight: 700; color: var(--accent-2); font-size: 0.68rem; }
        .match-pos   { font-family: var(--font-mono); }
        .match-value {
            font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-primary);
            background: rgba(0,0,0,0.3); border-radius: 4px; padding: 2px 6px;
            word-break: break-all;
        }
        .match-groups { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 2px; }
        .group-chip {
            font-size: 0.65rem; font-family: var(--font-mono);
            background: rgba(2,44,34,0.15); color: #10b981;
            border: 1px solid rgba(16,185,129,0.25); border-radius: 4px;
            padding: 1px 6px;
        }
        .group-chip .group-label { color: var(--text-muted); margin-right: 3px; }

        /* Highlight decorations in Monaco */
        .regex-match-highlight { background: rgba(255, 230, 80, 0.25) !important; border-bottom: 2px solid #fbbf24 !important; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<!-- HEADER -->
<header class="tool-header" aria-label="Regex Tester toolbar">
    <div class="header-left">
        <a href="/tools" class="back-link" aria-label="Back to DevSuite tools">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
            DevSuite
        </a>
        <div class="tool-identity">
            <div class="tool-icon" style="background:linear-gradient(135deg,#be185d,#f43f5e);box-shadow:0 0 14px rgba(190,24,93,0.45);" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
                </svg>
            </div>
            <span class="tool-name">Regex <span class="tool-accent">Tester</span></span>
            <span class="tool-version">v1.0</span>
        </div>
    </div>
    <div class="header-right">
        <output id="status-pill" class="status-pill idle" aria-live="polite" aria-atomic="true"><span class="status-dot" aria-hidden="true"></span><span id="status-text">Ready</span></output>
    </div>
</header>

<!-- REGEX PATTERN INPUT ROW -->
<div class="regex-input-row" role="search" aria-label="Regex pattern input">
    <span class="regex-slash" aria-hidden="true">/</span>
    <input id="regex-pattern" type="text" placeholder="([A-Za-z]+)\s+(\d+)" spellcheck="false" autocomplete="off"
        aria-label="Regular expression pattern" aria-describedby="status-text">
    <span class="regex-slash" aria-hidden="true">/</span>
    <fieldset class="flags-wrap">
        <legend class="sr-only">Regex flags</legend>
        <button class="flag-btn active" data-flag="g" title="Global — find all matches" aria-pressed="true" aria-label="Global flag — find all matches">g</button>
        <button class="flag-btn" data-flag="i" title="Case-insensitive" aria-pressed="false" aria-label="Case-insensitive flag">i</button>
        <button class="flag-btn" data-flag="m" title="Multiline — ^ and $ match line boundaries" aria-pressed="false" aria-label="Multiline flag">m</button>
        <button class="flag-btn" data-flag="s" title="Dotall — . matches newlines" aria-pressed="false" aria-label="Dotall flag — dot matches newlines">s</button>
    </fieldset>
    <button id="btn-clear" class="btn btn-ghost" style="margin-left:0.5rem;" aria-label="Clear pattern and test string">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        Clear
    </button>
</div>

<!-- SPLIT PANE -->
<main class="tool-main">
    <div class="split-pane">

        <!-- Test String (Monaco) -->
        <div class="pane-editor">
            <div class="pane-header">
                <span class="pane-label">Test String</span>
                <span id="line-count" class="line-badge" aria-live="polite" aria-atomic="true">0 lines</span>
            </div>
            <div id="input-editor" class="monaco-host" aria-label="Test string input editor"></div>
        </div>

        <!-- Match Results -->
        <div class="pane-output">
            <div class="pane-header">
                <span class="pane-label" id="output-label">Matches</span>
                <div class="pane-actions">
                    <span id="match-count-badge" class="line-badge" style="display:none;" aria-live="polite" aria-atomic="true"></span>
                    <button id="btn-copy-matches" class="btn btn-ghost" disabled style="padding:2px 8px;font-size:0.7rem;" aria-label="Copy all matches to clipboard">Copy</button>
                </div>
            </div>
            <section class="match-pane" id="match-pane" aria-label="Match results" aria-live="polite">
                <div class="match-empty" id="match-empty">
                    <span class="match-empty-icon" aria-hidden="true">🔎</span>
                    <span>Enter a pattern and test string to see matches</span>
                </div>
            </section>
        </div>

    </div>
</main>

<script src="/static/libs/require.min.js"></script>
<script>
(function () {
    'use strict';

    function toast(msg, type = 'info', ms = 2500) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        
        const span = document.createElement('span');
        span.textContent = msg;
        
        const btn = document.createElement('button');
        btn.className = 'toast-close';
        btn.textContent = '✕';
        btn.onclick = function() {
            this.parentElement.classList.add('hide');
            setTimeout(() => this.parentElement.remove(), 300);
        };
        
        t.appendChild(span);
        t.appendChild(btn);
        c.appendChild(t);
        setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 300); }, ms);
    }

    function buildRegex(pattern, flags) {
        try { return { ok: true, re: new RegExp(pattern, flags) }; }
        catch(e) { return { ok: false, error: e.message }; }
    }

    require.config({ paths: { vs: '/static/libs/vs' }});
    globalThis.MonacoEnvironment = { getWorkerUrl: () => URL.createObjectURL(new Blob([`
        self.MonacoEnvironment={baseUrl:'/static/libs/'};
        importScripts('/static/libs/vs/base/worker/workerMain.js');
    `], { type: 'text/javascript' })) };

    require(['vs/editor/editor.main'], () => {

        let editor, decorations = [];
        let activeFlags = new Set(['g']);

        editor = monaco.editor.create(document.getElementById('input-editor'), {
            value: 'Hello World 42\nFoo Bar 100\nregex testing 2026',
            language: 'plaintext', theme: 'vs-dark',
            automaticLayout: true, fontSize: 14,
            fontFamily: "'JetBrains Mono', monospace",
            lineHeight: 22, minimap: { enabled: false },
            scrollBeyondLastLine: false, padding: { top: 12, bottom: 12 },
            wordWrap: 'on',
        });

        const patternEl    = document.getElementById('regex-pattern');
        const statusPill   = document.getElementById('status-pill');
        const statusText   = document.getElementById('status-text');
        const lineCount    = document.getElementById('line-count');
        const matchPane    = document.getElementById('match-pane');
        const matchBadge   = document.getElementById('match-count-badge');
        const copyMatchBtn = document.getElementById('btn-copy-matches');

        function setStatus(s, text) { statusPill.className = `status-pill ${s}`; statusText.textContent = text; }

        function getFlags() { return [...activeFlags].join(''); }

        function appendMatchGroups(item, match) {
            if (!match.groups.length) return;
            const groupsDiv = document.createElement('div');
            groupsDiv.className = 'match-groups';
            match.groups.forEach((g, gi) => {
                groupsDiv.appendChild(buildGroupChip(g, gi, match.namedGroups));
            });
            item.appendChild(groupsDiv);
        }

        function buildGroupChip(g, gi, namedGroups) {
            const label = `$${gi + 1}`;
            const chip = document.createElement('span');
            chip.className = 'group-chip';
            const lblSpan = document.createElement('span');
            lblSpan.className = 'group-label';
            lblSpan.textContent = label + ':';
            chip.appendChild(lblSpan);
            chip.appendChild(document.createTextNode(g ?? 'undefined'));
            return chip;
        }

        let debounceTimer;
        function scheduleRun() { clearTimeout(debounceTimer); debounceTimer = setTimeout(runMatch, 180); }

        function runMatch() {
            const pattern = patternEl.value;
            const text    = editor.getValue();

            lineCount.textContent = text.split('\n').length + ' lines';

            if (!pattern) {
                patternEl.className = '';
                decorations = editor.deltaDecorations(decorations, []);
                renderEmpty('Enter a pattern above');
                setStatus('idle', 'Ready');
                return;
            }

            const flags = getFlags();
            const r = buildRegex(pattern, flags);
            if (!r.ok) {
                patternEl.className = 'invalid';
                decorations = editor.deltaDecorations(decorations, []);
                renderEmpty('⚠ ' + r.error);
                setStatus('invalid', 'Invalid pattern');
                return;
            }

            patternEl.className = 'valid';

            // Collect all matches
            const re = r.re;
            const matches = [];
            let m;

            if (flags.includes('g')) {
                re.lastIndex = 0;
                while ((m = re.exec(text)) !== null) {
                    matches.push({ index: m.index, value: m[0], groups: [...m].slice(1), namedGroups: m.groups || {} });
                    if (m[0].length === 0) re.lastIndex++; // avoid infinite loop on zero-width match
                }
            } else {
                m = re.exec(text);
                if (m) matches.push({ index: m.index, value: m[0], groups: [...m].slice(1), namedGroups: m.groups || {} });
            }

            // Monaco decorations (highlight matches)
            const model = editor.getModel();
            const newDecos = matches.map(match => {
                const start = model.getPositionAt(match.index);
                const end   = model.getPositionAt(match.index + match.value.length);
                return {
                    range: new monaco.Range(start.lineNumber, start.column, end.lineNumber, end.column),
                    options: { inlineClassName: 'regex-match-highlight' }
                };
            });
            decorations = editor.deltaDecorations(decorations, newDecos);

            // Render results list
            renderMatches(matches, flags);
        }

        function renderEmpty(msg) {
            matchPane.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'match-empty';
            
            const icon = document.createElement('span');
            icon.className = 'match-empty-icon';
            icon.textContent = '🔎';
            
            const text = document.createElement('span');
            text.textContent = msg;
            
            div.appendChild(icon);
            div.appendChild(text);
            matchPane.appendChild(div);
            
            matchBadge.style.display = 'none';
            matchBadge.textContent = '';
            copyMatchBtn.disabled = true;
        }

        function renderMatches(matches, flags) {
            if (!matches.length) {
                renderEmpty('No matches found');
                setStatus('idle', '0 matches');
                return;
            }

            const count = matches.length;
            setStatus('valid', `${count} match${count === 1 ? '' : 'es'}`);
            matchBadge.style.display = '';
            matchBadge.textContent = count + ' match' + (count === 1 ? '' : 'es');
            copyMatchBtn.disabled = false;

            matchPane.textContent = '';
            
            const summaryRow = document.createElement('div');
            summaryRow.className = 'match-summary';
            summaryRow.textContent = 'Matches ';
            const badge = document.createElement('span');
            badge.className = 'count-badge';
            badge.textContent = count;
            summaryRow.appendChild(badge);
            matchPane.appendChild(summaryRow);

            matches.forEach((match, i) => {
                const item = document.createElement('div');
                item.className = 'match-item';

                const head = document.createElement('div');
                head.className = 'match-item-head';
                
                const idxSpan = document.createElement('span');
                idxSpan.className = 'match-index';
                idxSpan.textContent = '#' + (i + 1);
                
                const posSpan1 = document.createElement('span');
                posSpan1.className = 'match-pos';
                posSpan1.textContent = `pos ${match.index}–${match.index + match.value.length}`;

                const posSpan2 = document.createElement('span');
                posSpan2.className = 'match-pos';
                posSpan2.textContent = `len ${match.value.length}`;
                
                head.appendChild(idxSpan);
                head.appendChild(posSpan1);
                head.appendChild(posSpan2);
                item.appendChild(head);

                const valDiv = document.createElement('div');
                valDiv.className = 'match-value';
                if (match.value) {
                    valDiv.textContent = match.value;
                } else {
                    const emptySpan = document.createElement('span');
                    emptySpan.style.color = 'var(--text-muted)';
                    emptySpan.textContent = 'empty string';
                    valDiv.appendChild(emptySpan);
                }
                item.appendChild(valDiv);

                appendMatchGroups(item, match);
                matchPane.appendChild(item);
            });
        }

        // Flag toggles
        document.querySelectorAll('.flag-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const f = btn.dataset.flag;
                if (activeFlags.has(f)) {
                    activeFlags.delete(f);
                    btn.classList.remove('active');
                    btn.setAttribute('aria-pressed', 'false');
                } else {
                    activeFlags.add(f);
                    btn.classList.add('active');
                    btn.setAttribute('aria-pressed', 'true');
                }
                scheduleRun();
            });
        });

        patternEl.addEventListener('input', scheduleRun);
        editor.onDidChangeModelContent(scheduleRun);

        // Copy matches
        copyMatchBtn.addEventListener('click', async () => {
            const items = [...document.querySelectorAll('.match-value')].map(el => el.textContent).join('\n');
            try { await navigator.clipboard.writeText(items); toast('Match values copied!', 'success'); }
            catch { toast('Could not copy', 'error'); }
        });

        // Clear
        document.getElementById('btn-clear').addEventListener('click', () => {
            patternEl.value = ''; editor.setValue('');
            decorations = editor.deltaDecorations(decorations, []);
            renderEmpty('Enter a pattern and test string to see matches');
            setStatus('idle', 'Ready'); patternEl.className = '';
        });

        // Initial run
        runMatch();
    });
})();
</script>
</body>
</html>
