<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Merge Logic Test</title>
<style>
  body { font-family: monospace; background:#0d1120; color:#f0f6fc; padding:1rem; }
  h2 { color: #6366f1; margin:1.5rem 0 0.5rem; }
  .result { padding:0.5rem 1rem; border-radius:6px; margin:0.25rem 0; font-size:0.85rem; }
  .pass { background:rgba(16,185,129,0.15); color:#6ee7b7; border-left:3px solid #10b981; }
  .fail { background:rgba(244,63,94,0.15);  color:#fda4af; border-left:3px solid #f43f5e; }
  .info { background:rgba(99,102,241,0.1);  color:#a5b4fc; border-left:3px solid #6366f1; margin-top:1rem; }
  pre  { background:#111827; padding:0.5rem; border-radius:4px; font-size:0.8rem; color:#cbd5e1; white-space:pre-wrap; }
  #editor { width:100%; height:500px; border:1px solid #334155; border-radius:8px; margin-top:1rem; }
</style>
</head>
<body>
<h1 style="color:#f0f6fc">🧪 Merge Logic Tests</h1>
<div id="log"></div>
<h2>Live Monaco merge test ↓</h2>
<div id="editor"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
<script>
/* ----------------------------------------------------------------
   UNIT TESTS — Pure JS, no Monaco needed
   These directly simulate the range/text calculations
   to verify the fix is correct before Monaco renders.
   ---------------------------------------------------------------- */
const log = document.getElementById('log');
let pass = 0, fail = 0;

function assert(label, got, expected) {
  const ok = JSON.stringify(got) === JSON.stringify(expected);
  if (ok) pass++; else fail++;
  log.innerHTML += `<div class="result ${ok?'pass':'fail'}">
    ${ok?'✅':'❌'} ${label}
    ${ok ? '' : `<pre>Expected: ${JSON.stringify(expected)}\nGot:      ${JSON.stringify(got)}</pre>`}
  </div>`;
}

/* Helper: simulate a simple text model */
function makeModel(text) {
  const lines = text.split('\n');
  return {
    getValue: () => text,
    getLineCount: () => lines.length,
    getLineMaxColumn: (n) => lines[n-1].length + 1,
    getValueInRange: (r) => {
      const sl=r.startLineNumber, sc=r.startColumn,
            el=r.endLineNumber,   ec=r.endColumn;
      if (sl === el) return lines[sl-1].substring(sc-1, ec-1);
      let result = lines[sl-1].substring(sc-1);
      for (let i=sl; i<el-1; i++) result += '\n' + lines[i];
      result += '\n' + lines[el-1].substring(0, ec-1);
      return result;
    }
  };
}

/* Simulate pushEditOperations */
function applyEdit(modelText, range, text) {
  const lines = modelText.split('\n');
  const sl=range.startLine-1, sc=range.startCol-1,
        el=range.endLine-1,   ec=range.endCol-1;
  const before = lines.slice(0, sl).join('\n')
               + (sl >= 0 ? '\n' : '')
               + lines[sl].substring(0, sc);
  const after  = lines[el].substring(ec)
               + (el < lines.length-1 ? '\n' : '')
               + lines.slice(el+1).join('\n');
  const result = (before + text + after).trimStart();
  // trimStart handles edge case of empty before
  return (sl === 0 && sc === 0 ? '' : lines.slice(0,sl).join('\n') + (sl?'\n':''))
       + lines[sl].substring(0, sc) + text
       + lines[el].substring(ec)
       + (el < lines.length-1 ? '\n' + lines.slice(el+1).join('\n') : '');
}

/* The fixed merge logic — mirror of what's in app.js */
function simulateMergeToRight(origModel, modModel, change) {
  const { originalStartLineNumber: oStart, originalEndLineNumber: oEnd,
          modifiedStartLineNumber: mStart, modifiedEndLineNumber: mEnd } = change;
  let text, range;

  if (oEnd === 0) {
    // Pure deletion from modified
    if (mEnd < modModel.getLineCount()) {
      range = { startLine: mStart, startCol: 1, endLine: mEnd+1, endCol: 1 };
    } else {
      const prevCol = mStart > 1 ? modModel.getLineMaxColumn(mStart-1) : 1;
      range = { startLine: Math.max(mStart-1,1), startCol: prevCol, endLine: mEnd, endCol: modModel.getLineMaxColumn(mEnd) };
    }
    text = '';
  } else if (mEnd === 0) {
    // Pure insertion into modified — mStart is line AFTER which to insert
    const srcText = origModel.getValueInRange({ startLineNumber:oStart, startColumn:1, endLineNumber:oEnd, endColumn:origModel.getLineMaxColumn(oEnd) });
    if (mStart === 0) {
      text = srcText + '\n'; range = { startLine:1, startCol:1, endLine:1, endCol:1 };
    } else {
      const endCol = modModel.getLineMaxColumn(mStart);
      text = '\n' + srcText; range = { startLine:mStart, startCol:endCol, endLine:mStart, endCol:endCol };
    }
  } else {
    // Modification
    text = origModel.getValueInRange({ startLineNumber:oStart, startColumn:1, endLineNumber:oEnd, endColumn:origModel.getLineMaxColumn(oEnd) });
    range = { startLine:mStart, startCol:1, endLine:mEnd, endCol:modModel.getLineMaxColumn(mEnd) };
  }
  return { text, range };
}

// ================================================================
// TEST CASES
// ================================================================

document.getElementById('log').innerHTML += `<div class="info">📋 Running unit tests on merge logic...</div>`;

// --- Test 1: Pure insertion (mEnd=0) — line added in orig, not in mod ---
{
  const orig = makeModel('a\nimport request\nimport os');
  const mod  = makeModel('a\nimport os');
  // Monaco change: orig has "import request" at line 2, mod has none → mStart=1 mEnd=0
  const change = { originalStartLineNumber:2, originalEndLineNumber:2, modifiedStartLineNumber:1, modifiedEndLineNumber:0 };
  const { text, range } = simulateMergeToRight(orig, mod, change);

  assert('Pure insertion: text starts with \\n (insert after mStart)', text.startsWith('\n'), true);
  assert('Pure insertion: inserts AFTER mStart (range at end of line 1)', range.startLine === 1 && range.startCol > 1, true);
  // Apply and check result
  const result = applyEdit('a\nimport os', range, text);
  assert('Pure insertion: result has import request on line 2', result.split('\n')[1], 'import request');
  assert('Pure insertion: import os stays below', result.split('\n')[2], 'import os');
  log.innerHTML += `<pre>Result:\n${result}</pre>`;
}

// --- Test 2: Pure deletion (oEnd=0) — line in mod not in orig ---
{
  const orig = makeModel('a\nimport os');
  const mod  = makeModel('a\nimport request\nimport os');
  // Monaco change: mod has "import request" at line 2, orig has none → oStart=1, oEnd=0
  const change = { originalStartLineNumber:1, originalEndLineNumber:0, modifiedStartLineNumber:2, modifiedEndLineNumber:2 };
  const { text, range } = simulateMergeToRight(orig, mod, change);
  assert('Pure deletion: text is empty', text, '');
  // Range should cover line 2 and its newline
  assert('Pure deletion: range covers full line + newline', range.startLine === 2 && range.endLine === 3, true);
}

// --- Test 3: Modification (both sides have lines) ---
{
  const orig = makeModel('def hello():\n    print("Hello")\n    return True');
  const mod  = makeModel('def hello():\n    print("World")\n    return False');
  const change = { originalStartLineNumber:2, originalEndLineNumber:3, modifiedStartLineNumber:2, modifiedEndLineNumber:3 };
  const { text, range } = simulateMergeToRight(orig, mod, change);
  assert('Modification: text = orig lines 2-3', text, '    print("Hello")\n    return True');
  assert('Modification: range covers mod lines 2-3', range.startLine === 2 && range.endLine === 3, true);
}

// --- Test 4: Insert at top of file (mStart=0) ---
{
  const orig = makeModel('# header\ncode');
  const mod  = makeModel('code');
  // Monaco: orig has "# header" at line 1, mod has none → mStart=0, mEnd=0
  const change = { originalStartLineNumber:1, originalEndLineNumber:1, modifiedStartLineNumber:0, modifiedEndLineNumber:0 };
  const { text, range } = simulateMergeToRight(orig, mod, change);
  assert('Insert at top: text ends with \\n', text.endsWith('\n'), true);
  assert('Insert at top: range starts at (1,1)', range.startLine === 1 && range.startCol === 1, true);
}

const total = pass + fail;
log.innerHTML += `<div class="result ${fail===0?'pass':'fail'}" style="margin-top:1rem;font-size:1rem;font-weight:600;">
  ${fail===0?'✅':'❌'} ${pass}/${total} tests passed ${fail>0?`(${fail} failed)`:''}
</div>`;

// ================================================================
// LIVE MONACO TEST
// ================================================================
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
require(['vs/editor/editor.main'], () => {
  const originalText = 'import os\nimport request\nfrom fastapi import FastAPI, UploadFile, File, HTTPException\nfrom fastapi.staticfiles import StaticFiles\nfrom fastapi.responses import HTMLResponse\nimport pandas\n\napp = FastAPI(';
  const modifiedText = 'import os\nfrom fastapi import FastAPI, UploadFile, File, HTTPException\nfrom fastapi.staticfiles import StaticFiles\nfrom fastapi.responses import HTMLResponse\nlogs = []\n\napp = FastAPI(';

  const editor = monaco.editor.createDiffEditor(document.getElementById('editor'), {
    theme: 'vs-dark', renderSideBySide: true, automaticLayout: true,
    fontSize: 13, scrollBeyondLastLine: false,
    minimap: { enabled: false }, glyphMargin: true, renderMarginRevertIcon: false
  });

  const origModel = monaco.editor.createModel(originalText, 'python');
  const modModel  = monaco.editor.createModel(modifiedText, 'python');
  editor.setModel({ original: origModel, modified: modModel });

  editor.onDidUpdateDiff(() => {
    const changes = editor.getLineChanges() || [];
    log.innerHTML += `<div class="info" style="margin-top:1rem">🔍 Monaco diff computed ${changes.length} change(s):<br>`;
    changes.forEach((c,i) => {
      log.innerHTML += `  Change ${i+1}: orig(${c.originalStartLineNumber}-${c.originalEndLineNumber}) → mod(${c.modifiedStartLineNumber}-${c.modifiedEndLineNumber})<br>`;
    });
    log.innerHTML += `</div>`;
    log.innerHTML += `<div class="info"><b>Click the → arrow in the gutter to test live merge. Check that lines don't overlap.</b></div>`;

    // Wire up glyph arrows with the FIXED logic
    const origEditor = editor.getOriginalEditor();
    const modEditor  = editor.getModifiedEditor();
    origEditor.updateOptions({ glyphMargin: true });
    modEditor.updateOptions({ glyphMargin: true });

    let origDecs = [];
    const oNew = [];
    changes.forEach(c => {
      const oLine = c.originalStartLineNumber > 0 ? c.originalStartLineNumber : c.modifiedStartLineNumber;
      if (oLine > 0) oNew.push({ range: new monaco.Range(oLine,1,oLine,1), options:{ glyphMarginClassName:'merge-right', glyphMarginHoverMessage:{value:'→ copy to right'}, description:'test' } });
    });
    origDecs = origEditor.deltaDecorations(origDecs, oNew);

    origEditor.onMouseDown(e => {
      if (e.target.type !== monaco.editor.MouseTargetType.GUTTER_GLYPH_MARGIN) return;
      const line = e.target.position.lineNumber;
      const change = changes.find(c => {
        const s=c.originalStartLineNumber||1, end=c.originalEndLineNumber||s;
        return line >= s && line <= end;
      });
      if (!change) return;

      // APPLY THE FIXED LOGIC DIRECTLY
      const { originalStartLineNumber: oStart, originalEndLineNumber: oEnd,
              modifiedStartLineNumber: mStart, modifiedEndLineNumber: mEnd } = change;
      let text, range;

      if (oEnd === 0) {
        if (mEnd < modModel.getLineCount()) {
          range = new monaco.Range(mStart, 1, mEnd+1, 1);
        } else {
          const prevCol = mStart > 1 ? modModel.getLineMaxColumn(mStart-1) : 1;
          range = new monaco.Range(Math.max(mStart-1,1), prevCol, mEnd, modModel.getLineMaxColumn(mEnd));
        }
        text = '';
      } else if (mEnd === 0) {
        const srcText = origModel.getValueInRange(new monaco.Range(oStart, 1, oEnd, origModel.getLineMaxColumn(oEnd)));
        if (mStart === 0) {
          text = srcText + '\n'; range = new monaco.Range(1,1,1,1);
        } else {
          const endCol = modModel.getLineMaxColumn(mStart);
          text = '\n' + srcText; range = new monaco.Range(mStart, endCol, mStart, endCol);
        }
      } else {
        text = origModel.getValueInRange(new monaco.Range(oStart, 1, oEnd, origModel.getLineMaxColumn(oEnd)));
        range = new monaco.Range(mStart, 1, mEnd, modModel.getLineMaxColumn(mEnd));
      }

      log.innerHTML += `<div class="info">🖱 Merge clicked — applying:<br>text=${JSON.stringify(text)}<br>range=(${range.startLineNumber},${range.startColumn})→(${range.endLineNumber},${range.endColumn})</div>`;
      modModel.pushEditOperations([], [{ range, text }], () => null);
    });
  });
});
</script>
<style>
.merge-right { cursor:pointer; }
.merge-right::after { content:'→'; color:#60a5fa; font-size:20px; font-weight:900; }
</style>
</body>
</html>
