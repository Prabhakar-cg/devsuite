<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff checker from Hell</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css?v=9">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 4c0-1.1.9-2 2-2"></path>
                    <path d="M20 2c1.1 0 2 .9 2 2"></path>
                    <path d="M22 8c0 1.1-.9 2-2 2"></path>
                    <path d="M16 10c-1.1 0-2-.9-2-2"></path>
                    <path d="M4 14c0-1.1.9-2 2-2"></path>
                    <path d="M10 12c1.1 0 2 .9 2 2"></path>
                    <path d="M12 18c0 1.1-.9 2-2 2"></path>
                    <path d="M6 20c-1.1 0-2-.9-2-2"></path>
                </svg>
                <h1>DiffChecker<span class="accent">.io</span></h1>
            </div>
            <div class="controls">
                <div class="control-group">
                    <label for="language-select">Language:</label>
                    <select id="language-select">
                        <option value="auto">Auto Detect</option>
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="typescript">TypeScript</option>
                        <option value="java">Java</option>
                        <option value="c">C</option>
                        <option value="cpp">C++</option>
                        <option value="csharp">C#</option>
                        <option value="go">Go</option>
                        <option value="rust">Rust</option>
                        <option value="php">PHP</option>
                        <option value="ruby">Ruby</option>
                        <option value="swift">Swift</option>
                        <option value="kotlin">Kotlin</option>
                        <option value="sql">SQL</option>
                        <option value="yaml">YAML</option>
                        <option value="yaml">Ansible</option>
                        <option value="groovy">Jenkinsfile</option>
                        <option value="hcl">Terraform</option>
                        <option value="dockerfile">Dockerfile</option>
                        <option value="shell">Shell Script</option>
                        <option value="json">JSON</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="markdown">Markdown</option>
                        <option value="plaintext">Plain Text</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="theme-select">Theme:</label>
                    <select id="theme-select">
                        <option value="vs-dark">Dark</option>
                        <option value="vs">Light</option>
                        <option value="hc-black">High Contrast</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="tabs">
                <button class="tab-btn active" data-tab="text-diff">Text Diff</button>
                <button class="tab-btn" data-tab="folder-diff">Folder Diff</button>
            </div>

            <!-- TEXT DIFF VIEW -->
            <div class="tab-content active" id="text-diff">
                <div class="input-panels" id="input-panels">
                <div class="panel original-panel">
                    <div class="panel-header">
                        <h2>Original Content</h2>
                        <button class="action-btn clear-btn" data-target="original-input">Clear</button>
                    </div>
                    <textarea id="original-input" placeholder="Paste original text here..."></textarea>
                </div>


                <div class="panel modified-panel">
                    <div class="panel-header">
                        <h2>Modified Content</h2>
                        <button class="action-btn clear-btn" data-target="modified-input">Clear</button>
                    </div>
                    <textarea id="modified-input" placeholder="Paste modified text here..."></textarea>
                </div>
            </div>
            
            <div class="action-bar">
                <button id="compare-btn" class="primary-btn">
                    <span>Compare Files</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>

            <div class="diff-container hidden" id="diff-container">
                <div class="panel-header diff-header">
                    <div class="diff-header-title">
                        <h2>Comparison Diff</h2>
                        <span id="detected-language-label" class="detected-lang-label hidden">Detected: <span id="lang-name"></span></span>
                    </div>
                    <div class="diff-actions">
                        <button id="merge-all-right-btn" class="secondary-btn" title="Overwrite ALL differences in Modified side">Merge All Right ➔</button>
                        <button id="merge-all-left-btn" class="secondary-btn" title="Overwrite ALL differences in Original side">🡄 Merge All Left</button>
                        <button id="toggle-inline-btn" class="secondary-btn">Inline View</button>
                        <button id="edit-btn" class="secondary-btn">Edit</button>
                    </div>
                </div>
                <!-- Monaco Editor will be mounted here -->
                <div id="monaco-diff-editor" class="editor-host"></div>
            </div>
            </div> <!-- End Text Diff View -->

            <!-- FOLDER DIFF VIEW -->
            <div class="tab-content hidden" id="folder-diff">
                <div class="folder-setup-panels">
                    <div class="panel">
                        <div class="panel-header">
                            <h2>Original Folder</h2>
                        </div>
                        <div class="folder-upload-area">
                            <input type="file" id="original-folder-input" webkitdirectory directory multiple class="hidden-file-input">
                            <button class="secondary-btn upload-btn" onclick="document.getElementById('original-folder-input').click()">Select Original Folder</button>
                            <span id="original-folder-name" class="folder-name-display">No folder selected</span>
                        </div>
                    </div>
                    


                    <div class="panel">
                        <div class="panel-header">
                            <h2>Modified Folder</h2>
                        </div>
                        <div class="folder-upload-area">
                            <input type="file" id="modified-folder-input" webkitdirectory directory multiple class="hidden-file-input">
                            <button class="secondary-btn upload-btn" onclick="document.getElementById('modified-folder-input').click()">Select Modified Folder</button>
                            <span id="modified-folder-name" class="folder-name-display">No folder selected</span>
                        </div>
                    </div>
                </div>
                
                <div class="action-bar">
                    <button id="compare-folders-btn" class="primary-btn" disabled>
                        <span>Compare Folders</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </button>
                </div>
                
                <div class="folder-results-container hidden" id="folder-results-container">
                    <div class="sidebar" id="file-tree-sidebar">
                        <div class="sidebar-header">
                            <h3>Changed Files</h3>
                        </div>
                        <ul class="file-tree" id="file-tree">
                            <!-- Populated by JS -->
                        </ul>
                    </div>
                    <!-- The Monaco editor will be injected into this host when in folder mode -->
                    <div class="folder-editor-wrapper" id="folder-editor-wrapper">
                        <div class="empty-state">Select a file from the sidebar to view diff</div>
                    </div>
                </div>
            </div> <!-- End Folder Diff View -->
        </main>
    </div>

    <!-- RequireJS for Monaco Editor loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <!-- Highlight.js for Language Auto-Detection -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/app.js?v=9"></script>
</body>
</html>
